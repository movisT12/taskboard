<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${task.id} ? 'Edit Task' : 'New Task'">Task Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="container">
    <header class="page-header">
        <h1 th:text="${task.id} ? 'Edit Task' : 'New Task'">Task</h1>
        <a th:href="@{/tasks}" class="btn">← Back</a>
    </header>

    <form th:action="${task.id} ? @{/tasks/{id}(id=${task.id})} : @{/tasks}"
          th:object="${task}" method="post" class="task-form">

        <div class="form-group">
            <label for="title">Title *</label>
            <input type="text" id="title" th:field="*{title}" required>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" th:field="*{description}" rows="3"></textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="status">Status</label>
                <select id="status" th:field="*{status}">
                    <option value="">-- Select --</option>
                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
                </select>
            </div>

            <div class="form-group">
                <label for="priority">Priority</label>
                <select id="priority" th:field="*{priority}">
                    <option value="">-- Select --</option>
                    <option th:each="p : ${priorities}" th:value="${p}" th:text="${p}"></option>
                </select>
            </div>

            <div class="form-group">
                <label for="dueDate">Due Date</label>
                <input type="date" id="dueDate" th:field="*{dueDate}">
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary"
                    th:text="${task.id} ? 'Update Task' : 'Create Task'">Save</button>
            <a th:href="@{/tasks}" class="btn">Cancel</a>
        </div>
    </form>
</main>
</body>
</html>
